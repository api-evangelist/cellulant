aid: cellulant
name: Cellulant
description: >-
  Cellulant is a pan-African payments platform headquartered in Nairobi, Kenya,
  operating across 35 African countries. Its flagship product Tingg is a single
  API that lets businesses collect online and offline payments, disburse to
  mobile money wallets and bank accounts, vend airtime and data, pay bills,
  and engage customers by SMS — interoperably across 350+ banks, mobile
  network operators, and card networks. Cellulant processes more than 4.5
  million transactions per day for over 2,000 enterprise merchants and powers
  payments for ~220 million consumers. The Tingg platform exposes three
  primary developer-facing surfaces: Tingg Checkout 3.0 (Express, Custom and
  Direct Card), Tingg Payouts (the Beep global JSON endpoint), and Tingg
  Engage (transactional SMS). Cellulant ships official SDKs for PHP, Python,
  Node.js, .NET, JavaScript, plus a WooCommerce plugin.
